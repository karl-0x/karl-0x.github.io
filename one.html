<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>giveaway</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
    background-image: url("llllll.png");
    background-repeat: no-repeat;
    background-position: center;
    background-size: cover;
    background-attachment: fixed;
    color: white;
}

/* Header */

header{
height:62px;
background:#000;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;
}

.left{
display:flex;
align-items:center;
}

.menu{
font-size:28px;
cursor:pointer;
margin-right:10px;
}

.logo{
font-size:34px;
font-weight:bold;
color:#FFFFFF;

}

.right{
display:flex;
align-items:center;
gap:10px;
}

.login{
    width:67px;
    height:36px;
    background:#ffffff;
    color:#009900;
    border:none;
    border-radius:6px;
    font-family:'Roboto', sans-serif;
    font-size:14px;
    font-weight:600;
    padding:0 16px;
    cursor:pointer;
    transition:all .2s ease;
}

.login:hover{
    background:#f3f3f3;
}
.signup{
    width:px;
    height:36px;
    background:#009900;
    color:#ffffff;
    border:none;
    border-radius:6px;
    font-family:'Roboto', sans-serif;
    font-size:14px;
    font-weight:600;
    padding:0 16px;
    cursor:pointer;
    transition:all .2s ease;
}

.search{
font-size:28px;
cursor:pointer;
}

/* Navigation */

.bottom-nav{
background:#181818;
display:flex;
overflow-x:auto;
white-space:nowrap;
}

.bottom-nav::-webkit-scrollbar{
display:none;
}

.item{
min-width:80px;
height:56px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
font-size:13px;
font-weight:bold;
cursor:pointer;
flex-shrink:0;
}

.item i{
font-size:22px;
margin-bottom:3px;
}

.active{
background:#00a300;
}

.active i{
color:white;
}


.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;justify-content:center;align-items:flex-start;padding-top:40px;z-index:9999}
.popup{width:390px;background:#fff;border-radius:6px;overflow:hidden;color:#000;box-shadow:0 8px 30px rgba(0,0,0,.35)}
.popup .head{background:#000;color:#fff;padding:18px;display:flex;justify-content:space-between;align-items:center}
.popup .body{background:#f4f4f4;padding:18px}
.popup .field{display:flex;align-items:center;background:#fff;border:1px solid #ddd;border-radius:4px;height:45px;padding:0 12px;margin-bottom:15px}
.popup input{border:none;outline:none;width:100%;font-size:16px}
.popup .links{display:flex;justify-content:space-between;margin:10px 0 18px}
.popup .links a{text-decoration:none;color:#333;font-size:14px}
.popup .join{background:#e9e9e9;padding:12px;border-radius:4px;display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.popup .go{width:100%;height:40px;background:#0a0;border:none;color:#fff;font-size:15px;border-radius:4px;cursor:pointer}

</style>

</head>

<body>

<header>

<div class="left">

<div class="menu">
<i class="fa-solid fa-bars"></i>
</div>

<div class="logo">
betway
</div>

</div>

<div class="right">

<button class="login" onclick="openLogin()">
Login
</button>

<button class="signup">
Sign Up
</button>

<div class="search">
<i class="fa-solid fa-magnifying-glass"></i>
</div>

</div>

</header>

<div class="bottom-nav">

<div class="item active">
<i class="fa-solid fa-house"></i>
<div>Home</div>
</div>

<div class="item">
<i class="fa-solid fa-futbol"></i>
<div>Sport</div>
</div>

<div class="item">
<i class="fa-solid fa-basketball"></i>
<div>Live</div>
</div>

<div class="item">
<i class="fa-solid fa-plane"></i>
<div>Aviator</div>
</div>

<div class="item">
<i class="fa-solid fa-777"></i>
<div>Casino</div>
</div>

<div class="item">
<i class="fa-solid fa-horse"></i>
<div>Racing</div>
</div>

<div class="item">
<i class="fa-solid fa-dice"></i>
<div>Lucky</div>
</div>

<div class="item">
<i class="fa-solid fa-ticket"></i>
<div>Betgames</div>
</div>

<div class="item">
<i class="fa-solid fa-tv"></i>
<div>Live TV</div>
</div>

<div class="item">
<i class="fa-solid fa-gift"></i>
<div>Promos</div>
</div>

</div>


<div class="overlay" id="loginOverlay">
<div class="popup">
<div class="head"><h2>Login</h2><span style="font-size:28px;cursor:pointer" onclick="closeLogin()">&times;</span></div>
<div class="body">
<div class="field"><span style="margin-right:10px">+27</span><input placeholder="Mobile Number"></div>
<div class="field"><input type="password" placeholder="Enter Password"><i class="fa-solid fa-eye"></i></div>
<div class="links"><a href="#">Forgot Username</a><a href="#">Forgot Password?</a></div>
<div class="join"><span>Don't have an account yet?</span><a href="#" style="text-decoration:none;color:#000;font-weight:bold">Sign Up <i class="fa-solid fa-angle-right"></i></a></div>
<button class="go">Login</button>
</div></div></div>
<script>
function openLogin(){document.getElementById('loginOverlay').style.display='flex';}
function closeLogin(){document.getElementById('loginOverlay').style.display='none';}
</script>

</body>
</html>
